services:
    shipmonk-packing-mysql:
        image: mariadb:10.10
        ports:
            -
                target: 3306
                published: 3306
        environment:
            MYSQL_ROOT_PASSWORD: secret
            MYSQL_DATABASE: packing
        hostname: mysql

    shipmonk-packing-app:
        depends_on:
            - shipmonk-packing-mysql
        build: .
        working_dir: /app
        volumes:
            - .:/app
        ports:
            - "8000:8000"
        command: bash -c "composer install && php -S 0.0.0.0:8000 -t public"

    shipmonk-packing-adminer:
        depends_on:
            - shipmonk-packing-mysql
        image: adminer:latest
        ports:
            -
                target: 8080
                published: 8080
